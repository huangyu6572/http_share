name: opencode

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  opencode:
    if: |
      contains(github.event.comment.body, '/oc') ||
      contains(github.event.comment.body, '/opencode')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: write
    env:
      XDG_DATA_HOME: /tmp/xdg-data
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Setup Copilot auth
        shell: bash
        env:
          COPILOT_ACCESS_TOKEN: ${{ secrets.COPILOT_ACCESS_TOKEN }}
          COPILOT_REFRESH_TOKEN: ${{ secrets.COPILOT_REFRESH_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p "$XDG_DATA_HOME/opencode"
          jq -n \
            --arg access "$COPILOT_ACCESS_TOKEN" \
            --arg refresh "$COPILOT_REFRESH_TOKEN" \
            '{
              "github-copilot": {
                "type": "oauth",
                "access": $access,
                "refresh": $refresh,
                "expires": 0
              }
            }' > "$XDG_DATA_HOME/opencode/auth.json"
          chmod 600 "$XDG_DATA_HOME/opencode/auth.json"

      - uses: anomalyco/opencode/github@latest
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          use_github_token: true
          share: false
          model: github-copilot/gpt-4o
